services:
  hypothesis-factory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hypothesis-factory
    env_file:
      - .env
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j
    restart: unless-stopped

  hypothesis-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hypothesis-api
    env_file:
      - .env
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8503:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: hypothesis-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hypothesis2026}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
